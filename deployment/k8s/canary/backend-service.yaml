apiVersion: v1
kind: Service
metadata:
  name: fusion-electronics-backend
  namespace: fusion-ecommerce
  labels:
    app: fusion-electronics
    component: backend
spec:
  type: ClusterIP

  selector:
    app: fusion-electronics
    component: backend
    version: stable

  ports:
    - name: http
      protocol: TCP
      port: 8000
      targetPort: 8000