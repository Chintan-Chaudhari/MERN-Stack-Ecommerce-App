apiVersion: v1
kind: Service
metadata:
  name: fusion-electronics-frontend
  namespace: fusion-ecommerce
  labels:
    app: fusion-electronics
    component: frontend

spec:
  type: NodePort  

  selector:
    app: fusion-electronics
    component: frontend
    version: stable

  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
      nodePort: 30080